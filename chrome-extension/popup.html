<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">CD Map Tracker</div>

  <div class="status-row">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">Checking...</span>
  </div>

  <div class="info-row" id="coords-row">
    <span class="label">Position:</span>
    <span id="coords" class="value">—</span>
  </div>

  <div class="info-row" id="realm-row">
    <span class="label">Realm:</span>
    <span id="realm" class="value">—</span>
  </div>

  <div class="divider"></div>

  <button id="btn-follow" class="btn">Follow Player</button>
  <button id="btn-calibrate" class="btn">Calibrate</button>

  <div class="divider"></div>

  <div class="section-title">Waypoints</div>
  <div class="wp-row">
    <input type="text" id="wp-name" placeholder="Waypoint name" class="wp-input">
    <button id="btn-save-wp" class="btn btn-small">Save</button>
  </div>
  <button id="btn-fetch-community" class="btn btn-small" style="width:100%">Refresh Community Waypoints</button>

  <div class="footer">
    <a href="https://mapgenie.io/crimson-desert/maps/pywel" target="_blank">Open MapGenie</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
